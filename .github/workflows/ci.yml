name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  debugger-statements:
    runs-on: ubuntu-latest

    steps:
      - name: Check for debugger statements
        run: |
          if grep -rn --include="*.ts" --include="*.js" "debugger" src tests; then
            echo "Error: debugger; statements found"
            exit 1
          fi

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
